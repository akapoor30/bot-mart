<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Bot | Best Prices</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Compare prices instantly across Blinkit, Zepto, and Instamart.">
</head>
<body>

    <header>
        <h1>Delivery Bot</h1>
        <p class="subtitle">Find the cheapest quick commerce option instantly</p>
    </header>

    <div class="glass-panel" id="search-panel">
        <form class="search-form" id="searchForm">
            <div class="input-group">
                <label for="productInput">What are you looking for?</label>
                <input type="text" id="productInput" placeholder="e.g. Maggi, Milk, Bread" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="pincodeInput">Delivery Pincode</label>
                <input type="text" id="pincodeInput" placeholder="e.g. 560095" required autocomplete="off" pattern="[0-9]{6}" title="6 digit pincode">
            </div>
            
            <button type="submit" id="searchBtn">Compare Prices</button>
        </form>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p>Orchestrating AI Scrapers across Blinkit, Zepto, & Instamart...</p>
    </div>

    <!-- Results Area -->
    <div id="results-container">
        
        <div class="winner-section" id="winnerSection">
            <h2 class="section-title">🏆 Top Pick</h2>
            <!-- Injected via JS -->
            <div id="winnerCardWrapper"></div>
        </div>

        <div class="others-section" id="othersSection">
            <h2 class="section-title">All Results</h2>
            <div class="other-results" id="otherResultsList">
                <!-- Injected via JS -->
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
